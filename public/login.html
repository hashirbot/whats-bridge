<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | WhatsBridge by ERPAGENT</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "surface-container-lowest": "#ffffff",
          "surface": "#f7f9fc",
          "primary": "#00453d",
          "on-primary": "#ffffff",
          "background": "#f7f9fc",
          "outline": "#6f7976",
          "primary-fixed": "#a8f0e3",
          "on-primary-fixed": "#00201c",
          "on-surface": "#191c1e",
          "error": "#ba1a1a",
          "primary-container": "#075e54",
          "surface-container-high": "#e6e8eb",
          "surface-container-low": "#f2f4f7",
          "secondary-container": "#5dfd8a",
          "surface-variant": "#e0e3e6",
          "on-surface-variant": "#3f4946",
          "outline-variant": "#bec9c5",
          "on-primary-container": "#8dd5c8",
          "secondary": "#006d2f",
          "surface-container": "#eceef1",
        },
        fontFamily: {
          "headline": ["Manrope"],
          "body": ["Inter"],
          "label": ["Inter"]
        },
        borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
      },
    },
  }
</script>
<style>
    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .glass-panel {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px);
    }
    .editorial-shadow {
        box-shadow: 0 20px 40px rgba(25, 28, 30, 0.06);
    }
</style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary-fixed/30 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[30%] h-[30%] bg-secondary-container/20 rounded-full blur-[100px] pointer-events-none"></div>
<main class="w-full max-w-[440px] z-10">
<div class="flex flex-col items-center mb-10">
<div class="w-14 h-14 bg-primary rounded-xl flex items-center justify-center mb-4 editorial-shadow">
<span class="material-symbols-outlined text-on-primary text-3xl" style="font-variation-settings: 'FILL' 1;">chat</span>
</div>
<h1 class="font-headline font-extrabold text-2xl text-primary tracking-tight">WhatsBridge</h1>
<p class="text-on-surface-variant font-medium text-sm mt-1">by ERPAGENT</p>
</div>
<div class="surface-container-lowest glass-panel rounded-xl p-8 editorial-shadow border border-white/20">
<h2 class="font-headline font-bold text-xl text-on-surface mb-2">Welcome Back</h2>
<p class="text-on-surface-variant text-sm mb-8">Sign in to access your messaging dashboard.</p>
<div id="error-msg" class="hidden mb-4 p-3 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg"></div>
<form id="login-form" class="space-y-6">
<div class="space-y-2">
<label class="block text-xs font-semibold uppercase tracking-wider text-outline" for="username">Username</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors text-xl">person</span>
</div>
<input class="w-full pl-11 pr-4 py-3 bg-surface-container-high border-none rounded-lg text-on-surface placeholder:text-outline/60 focus:ring-2 focus:ring-primary/20 transition-all outline-none" id="username" name="username" placeholder="Enter username" required type="text"/>
</div>
</div>
<div class="space-y-2">
<label class="block text-xs font-semibold uppercase tracking-wider text-outline" for="password">Password</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors text-xl">lock</span>
</div>
<input class="w-full pl-11 pr-12 py-3 bg-surface-container-high border-none rounded-lg text-on-surface placeholder:text-outline/60 focus:ring-2 focus:ring-primary/20 transition-all outline-none" id="password" name="password" placeholder="••••••••" required type="password"/>
<div class="absolute inset-y-0 right-0 pr-4 flex items-center">
<button class="text-outline hover:text-primary transition-colors" type="button" onclick="togglePassword()">
<span id="eye-icon" class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
</div>
<button id="login-btn" class="w-full py-4 bg-gradient-to-br from-primary to-primary-container text-on-primary font-semibold rounded-lg editorial-shadow hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
    Log In
    <span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
</form>
</div>
<div class="mt-12 flex justify-center gap-6 opacity-40 grayscale hover:opacity-80 transition-opacity">
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-lg">verified_user</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Secured</span>
</div>
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-lg">privacy_tip</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Private</span>
</div>
</div>
</main>
<script>
function togglePassword() {
    const p = document.getElementById('password');
    const icon = document.getElementById('eye-icon');
    if (p.type === 'password') {
        p.type = 'text';
        icon.textContent = 'visibility_off';
    } else {
        p.type = 'password';
        icon.textContent = 'visibility';
    }
}

document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const errEl = document.getElementById('error-msg');
    errEl.classList.add('hidden');
    btn.disabled = true;
    btn.innerHTML = '<span class="animate-spin material-symbols-outlined text-lg">progress_activity</span> Signing in...';

    try {
        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
            }),
        });
        const data = await res.json();
        if (data.success) {
            window.location.href = '/';
        } else {
            errEl.textContent = data.error || 'Invalid credentials';
            errEl.classList.remove('hidden');
        }
    } catch (err) {
        errEl.textContent = 'Connection error. Please try again.';
        errEl.classList.remove('hidden');
    }

    btn.disabled = false;
    btn.innerHTML = 'Log In <span class="material-symbols-outlined text-lg">arrow_forward</span>';
});
</script>
</body></html>
