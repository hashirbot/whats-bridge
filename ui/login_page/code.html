</div>

<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block text-xs font-semibold uppercase tracking-wider text-outline" for="password">Password</label>

</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">

<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
</div>

<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary cursor-pointer" id="remember" name="remember" type="checkbox"/>
<label class="ml-2 text-sm text-on-surface-variant cursor-pointer select-none" for="remember">Keep me logged in for 30 days</label>
</div>
<!-- Log In Button -->
<button class="w-full py-4 bg-gradient-to-br from-primary to-primary-container text-on-primary font-semibold rounded-lg editorial-shadow hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
